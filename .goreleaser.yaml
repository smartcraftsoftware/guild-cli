project_name: guild-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: guild
    main: .
    binary: guild
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/smartcraftsoftware/guild-cli/cmd.Version={{.Version}}
      - -X github.com/smartcraftsoftware/guild-cli/cmd.Commit={{.Commit}}
      - -X github.com/smartcraftsoftware/guild-cli/cmd.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: guild-cli
    repository:
      owner: smartcraftsoftware
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/smartcraftsoftware/guild-cli"
    description: "Guild CLI — terminal interface to SmartCraft's Guild platform"
    license: "MIT"
    install: |
      bin.install "guild"
    test: |
      system "#{bin}/guild", "version"

release:
  github:
    owner: smartcraftsoftware
    name: guild-cli
